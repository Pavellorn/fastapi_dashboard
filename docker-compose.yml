services:
  web:
    image: pashakor/ozon-dashboard:latest
    container_name: ozon-dashboard
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    environment:
      - TZ=Europe/Moscow
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://interparts.mpsuper.ru}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3